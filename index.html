/* GitHub HTML8.8 (Refactored) */
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>父兄出欠確認アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    /* ===================================================
       1. 全体設定・ルート変数
    =================================================== */
    :root {
      --main-green: #27ae60;
      --sat-blue: #2980b9;
      --sun-red: #d35400;
      --bg-light: #f4f7f8;
      --my-row-bg: #fffbe6;
      --name-col-width: 60px;
    }
    
    html, body {
      position: fixed; 
      width: 100%; 
      height: 100%;
      overflow: hidden; 
      overscroll-behavior: none;
      font-family: sans-serif; 
      margin: 0; 
      background: var(--bg-light); 
      color: #333;
    }

    .container {
      padding: 4px; 
      display: flex; 
      flex-direction: column;
      height: 100%; 
      height: 100dvh; 
      overflow: hidden; 
      box-sizing: border-box;
    }

    h3 { 
      text-align: center; 
      font-size: 18px; 
      margin: 6px 0; 
      width: 100%; 
    }

    /* ===================================================
       2. 過去データ閲覧モード用 UI
    =================================================== */
    .past-controls {
      display: none;
      align-items: center; 
      justify-content: center; 
      padding: 6px; 
      background: white; 
      border-radius: 8px; 
      margin-bottom: 8px; 
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .past-controls select { 
      padding: 2px 4px; 
      font-size: 15px; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
      height: 36px; 
      box-sizing: border-box;
    }
    .past-controls span { 
      font-size: 14px; 
      font-weight: bold; 
      margin: 0 3px; 
      color: #555; 
    }
    
    .btn-show-past {
      padding: 0 16px; 
      margin-left: 5px; 
      background: var(--main-green); 
      color: white; 
      border: none; 
      border-radius: 4px; 
      font-weight: bold; 
      cursor: pointer;
      font-size: 18px; 
      height: 36px; 
      line-height: 1; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      transition: all 0.3s ease;
    }

    .btn-highlight {
      background: #2ecc71 !important;
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.2);
      animation: pulse-green 1.5s infinite;
    }
    @keyframes pulse-green {
      0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
      100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
    }

    /* ===================================================
       3. 表（テーブル）のレイアウトとスクロール設定
    =================================================== */
    .table-wrapper {
      flex: 1; 
      overflow-y: auto; 
      overflow-x: auto;
      border-radius: 8px; 
      background: white; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 65px;
      position: relative;
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      table-layout: fixed; 
      min-width: 100%; 
    }

    thead { position: sticky; top: 0; z-index: 10; }
    th { background: var(--main-green); color: white; padding: 4px 0; font-size: 11px; border: none; font-weight: bold; }
    th.sat { background: var(--sat-blue); }
    th.sun { background: var(--sun-red); }

    td { border-bottom: 1px solid #eee; height: 48px; text-align: center; }
    .other-row td { height: 34px !important; }

    .count-box { font-size: 10px; margin-top: 3px; padding: 2px 4px; background: rgba(0,0,0,0.15); font-weight: normal; line-height: 1.3; }
    .count-row { display: flex; justify-content: space-between; }

    .name-col-head, .name-cell {
      position: sticky; 
      left: 0; 
      z-index: 11;
      width: var(--name-col-width); 
    }
    .name-cell {
      padding: 0 2px; font-weight: bold; font-size: 12px; text-align: left; 
      background: #fafafa; border-right: 2px solid var(--main-green); 
      word-break: break-all; z-index: 5;
    }

    .my-row, .my-row .name-cell { background-color: var(--my-row-bg) !important; }

    /* ===================================================
       4. セルの状態（ステータス）とコメント行
    =================================================== */
    .status-cell { font-size: 24px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .status-〇 { color: var(--main-green); font-weight: bold; }
    .status-△ { color: #f39c12; font-weight: bold; }
    .status-× { color: #7f8c8d; font-weight: bold; }
    .status-- { color: #ccc; }
    
    .locked { background-color: #f2f2f2 !important; color: #bbb !important; cursor: not-allowed; }

    .com-row td { height: 34px !important; }
    .com-row { background: #fff; }
    .com-label { font-size: 10px; color: #888; padding: 2px 6px; border-right: 2px solid #ccc; font-weight: normal; line-height: 1.2; box-sizing: border-box; }
    .com-label-top { text-align: left; display: block; margin-bottom: 2px; }
    .com-label-bottom { text-align: right; display: block; }
    .com-icon { font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    .com-text { font-size: 10px; color: #666; cursor: pointer; display: inline-block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40px; }

    /* ===================================================
       5. 汎用 UI コンポーネント（フッター、ローディング等）
    =================================================== */
    .footer-bar { 
      position: fixed; bottom: 0; left: 0; width: 100%; 
      padding: 10px; background: white; border-top: 1px solid #ddd; 
      display: none; box-sizing: border-box; z-index: 100; 
    }
    .btn-save { 
      width: 100%; background: var(--main-green); color: white; 
      border: none; padding: 12px; border-radius: 8px; 
      font-size: 16px; font-weight: bold; cursor: pointer; 
    }
    
    #loading { 
      position: fixed; top:0; left:0; width:100%; height:100%; 
      background:rgba(255,255,255,0.9); display:flex; flex-direction:column; 
      align-items:center; justify-content:center; z-index:9999; 
    }
    .spinner { 
      width: 40px; height: 40px; border: 4px solid #ddd; 
      border-top: 4px solid var(--main-green); border-radius: 50%; 
      animation: spin 1s linear infinite; 
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .scroll-indicator {
      position: fixed; bottom: 75px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7); color: white; padding: 6px 16px; border-radius: 20px;
      font-size: 12px; font-weight: bold; display: none; z-index: 1000;
      pointer-events: auto; cursor: pointer; -webkit-tap-highlight-color: transparent;
      animation: bounce 1.5s infinite;
    }
    @keyframes bounce { 0%, 100% { bottom: 75px; } 50% { bottom: 65px; } }
    
    .view-mode .table-wrapper { margin-bottom: 0; }
    .view-mode td { height: 34px; }
    .view-mode .scroll-indicator { bottom: 20px; }
    .no-schedule-msg { padding: 40px 20px; text-align: center; font-weight: bold; color: #666; }

    /* ===================================================
       6. モーダルウィンドウ（コメント入力画面）
    =================================================== */
    .modal { 
      position: fixed; top:0; left:0; width:100%; height:100%; 
      background:rgba(0,0,0,0.6); display:none; align-items:center; 
      justify-content:center; z-index:2000; 
    }
    .modal-box { background:white; width:85%; max-width:400px; border-radius:8px; padding:20px; box-sizing:border-box; }
    .modal-title { font-weight:bold; margin-bottom:10px; font-size:14px; border-bottom: 2px solid var(--main-green); padding-bottom: 5px; }
    .modal-input { width:100%; padding:10px; font-size:14px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box; margin-bottom:15px; }
    .modal-btns { display:flex; gap:10px; }
    .modal-btn { flex:1; padding:10px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body id="bodyTag">

  <div id="loading">
    <div class="spinner"></div>
    <p id="loadingText">読込中...</p>
  </div>

  <div id="registration-view" style="display:none; padding:20px; text-align:center;">
    <h3 id="regTitle">初回登録</h3>
    <p>あなたのお名前を選択してください</p>
    <select id="name-list" style="width:100%; padding:12px; margin:15px 0; font-size:16px;"></select>
    <p style="font-size: 12px; color: #d35400; font-weight: bold; margin-top: 15px;">
      ※ご自身のお名前がない場合や、誤ってアクセスした場合は管理者にご連絡ください。
    </p>
    <button class="btn-save" onclick="link()">登録する</button>
  </div>

  <div class="container" id="main-view" style="display:none;">
    <h3 id="weekTitle"></h3>
    
    <div id="past-view-controls" class="past-controls">
      <select id="sel-year"></select> <span>年</span>
      <select id="sel-month"></select> <span>月</span>
      <select id="sel-monday"></select> <span>日(週)</span>
      <button class="btn-show-past" onclick="fetchPastData()">表示</button>
    </div>

    <div class="table-wrapper" id="content-area">
      <table id="mainTable"></table>
    </div>
    
    <div id="scrollIndicator" class="scroll-indicator">▼ 下に続きがあります</div>
    
    <div id="footer" class="footer-bar">
      <button class="btn-save" onclick="saveAll()">変更を保存して閉じる</button>
    </div>
  </div>

  <div id="commentModal" class="modal">
    <div class="modal-box">
      <div id="modalTitle" class="modal-title"></div>
      <p id="modalDesc" style="font-size:11px; color:#666; margin:0 0 5px 0;"></p>
      <input type="text" id="modalInput" class="modal-input" placeholder="特になし">
      <div class="modal-btns">
        <button class="modal-btn" style="background:#eee; color:#333;" onclick="closeModal()">キャンセル</button>
        <button id="modalApplyBtn" class="modal-btn" style="background:var(--main-green); color:white;" onclick="applyComment()">決定</button>
      </div>
    </div>
  </div>

  <script>
    /**
     * ==============================================================================
     * [Level 1] 定数・全体変数定義
     * ==============================================================================
     * アプリケーション全体で使用する設定値や状態管理フラグを定義します。
     */
    // [Level 4] GASのURLとLIFF IDの設定
    const SETTINGS = {
      GAS_URL: "https://script.google.com/macros/s/AKfycbz4M2wVSJmz1WwE5Aevak9JN0MPZTlbNeYiPDRaFATwtrF2vJdRh2zxIgGnJe05iNoe/exec",
      LIFF_ID: "2009266487-GEiMe9Ei"
    };

    // [Level 4] 記号とラベルのマッピング設定
    const UI_CONFIG = {
      signs: ["〇", "△", "×", "-"],
      labels: { "〇": "参加", "△": "遅参", "×": "欠席", "-": "未回答" }
    };

    let MY_LINE_ID = "";       // [Level 4] LINEユーザーID
    let IS_VIEW_MODE = false;  // [Level 4] 閲覧モードかどうかのフラグ
    let DEADLINE_HOUR = 23;    // [Level 4] デフォルトの回答期限（前日23時）
    let WEEK_LABEL = "";       // [Level 4] 対象週のラベル（例: 2026/04/13〜）
    let days = [];             // [Level 4] 日付データの配列
    let rawData = [];          // [Level 4] 取得した全父兄のデータ
    let hasChanges = false;    // [Level 4] 編集が行われたかどうかのフラグ
    let isSaving = false;      // [Level 4] 保存処理中かどうかのフラグ

    // [Level 4] 現在編集中のモーダルの対象インデックス
    let currentEditFIdx = -1;  // 行（父兄）のインデックス
    let currentEditDIdx = -1;  // 列（日付）のインデックス


    /**
     * ==============================================================================
     * [Level 1] 1. 初期化・通信処理
     * ==============================================================================
     * アプリの起動、LINEログイン、およびGASとのデータ送受信を行います。
     */

    /**
     * アプリ起動時の初期化処理
     * * [Level 2] URLパラメータを解析し、LIFFの初期化からデータ取得までの一連のフローを制御します。
     */
    async function init() {
      // ----------------------------------------------------------------------------
      // [Level 3] 1. モード判定とUI準備
      // ----------------------------------------------------------------------------
      const params = new URLSearchParams(window.location.search);
      IS_VIEW_MODE = (params.get('mode') === 'view');
      
      if (IS_VIEW_MODE) {
        // [Level 4] 閲覧モード専用のCSSクラスを付与
        document.getElementById("bodyTag").classList.add("view-mode");
      }

      // ----------------------------------------------------------------------------
      // [Level 3] 2. LIFF認証とデータフェッチ
      // ----------------------------------------------------------------------------
      try {
        await liff.init({ liffId: SETTINGS.LIFF_ID });
        // [Level 4] 未ログインの場合はログイン画面へリダイレクト
        if (!liff.isLoggedIn()) { 
          liff.login(); 
          return; 
        }
        
        const profile = liff.getDecodedIDToken();
        MY_LINE_ID = profile.sub;
        
        // [Level 4] 認証成功後、GASからデータを取得
        await fetchData(); 
      } catch (e) {
        document.getElementById("loading").style.display = "none";
        console.error(e);
        alert("初期化または通信エラーが発生しました\n\n詳細: " + e.message);
      }
    }

    /**
     * タイムアウト付きFetch通信
     * * [Level 2] 通信がフリーズするのを防ぐため、指定時間で通信を強制終了します。
     * @param {string} url - リクエストURL
     * @param {Object} options - fetchオプション
     * @param {number} timeout - タイムアウト時間（ミリ秒）
     * @returns {Promise<Response>}
     */
    async function fetchWithTimeout(url, options = {}, timeout = 15000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(id);
        return response;
      } catch (e) {
        clearTimeout(id);
        if (e.name === 'AbortError') throw new Error("通信タイムアウト");
        throw e;
      }
    }

    /**
     * GASからの出欠データ取得
     * * [Level 2] メインデータ取得処理。失敗時の自動リトライ機能と、状況に応じた画面遷移を含みます。
     * @param {number} retryCount - リトライ回数（再帰用）
     * @param {string|null} targetDateStr - 過去データ取得時の基準日
     */
    async function fetchData(retryCount = 0, targetDateStr = null) {
      const appUrl = encodeURIComponent(window.location.href.split('?')[0]);
      let url = `${SETTINGS.GAS_URL}?uid=${MY_LINE_ID}&action=get&mode=${IS_VIEW_MODE ? 'view' : 'edit'}&appUrl=${appUrl}&v=${Date.now()}`;
      if (targetDateStr) url += `&targetDate=${targetDateStr}`;

      try {
        const res = await fetchWithTimeout(url);
        if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
        
        const data = await res.json();
        if (data.status === "error") throw new Error("GAS側エラー: " + data.message);

        // [Level 4] ページタイトル（ブラウザタブ）の動的更新
        if (data.data && data.data.title) {
          document.title = data.data.title;
        }

        // ----------------------------------------------------------------------------
        // [Level 3] 1. データ取得成功時の処理
        // ----------------------------------------------------------------------------
        if (data.status === "success") {
          // [Level 4] スケジュールが存在しない場合のUI表示
          if (data.data.noSchedule) {
            document.getElementById("loading").style.display = "none";
            document.getElementById("main-view").style.display = "flex";
            document.getElementById("weekTitle").innerText = "(未設定)";
            document.getElementById("content-area").innerHTML = '<div class="no-schedule-msg">現在、有効なスケジュールはありません</div>';
            return;
          }

          // [Level 4] 取得データをグローバル変数に格納
          WEEK_LABEL = data.data.weekLabel;
          days = data.data.dates;
          rawData = data.data.families;
          if (data.data.deadlineHour !== undefined) DEADLINE_HOUR = data.data.deadlineHour;

          // メインUIの表示切り替え
          document.getElementById("main-view").style.display = "flex";
          
          if (IS_VIEW_MODE) {
            // [Level 4] 閲覧モード用：日付コントロールバーの表示とドロップダウン初期化
            document.getElementById("weekTitle").style.display = "none";
            document.getElementById("past-view-controls").style.display = "flex";
            if (document.getElementById("sel-year").options.length === 0) initDateDropdowns();
            if (data.data.baseDateStr) setDropdownsToDate(data.data.baseDateStr);
          } else {
            // [Level 4] 編集モード用：本日の日付算出と各種UIの表示
            document.getElementById("weekTitle").style.display = "block";
            document.getElementById("past-view-controls").style.display = "none";
            document.getElementById("footer").style.display = "block";

            const now = new Date();
            const weekStrs = ["日", "月", "火", "水", "木", "金", "土"];
            const todayStr = `${now.getMonth() + 1}/${now.getDate()}(${weekStrs[now.getDay()]})`;
            document.getElementById("weekTitle").innerHTML = `${data.data.weekLabel} <span style="font-size: 14px; color: #555; margin-left: 8px;">本日：${todayStr}</span>`;
          }

          document.getElementById("loading").style.display = "none";
          render(); // テーブル描画処理の呼び出し

        // ----------------------------------------------------------------------------
        // [Level 3] 2. 未登録（初回アクセス）時の処理
        // ----------------------------------------------------------------------------
        } else if (data.status === "unregistered") {
          document.getElementById("loading").style.display = "none";
          document.getElementById("registration-view").style.display = "block";
          document.getElementById("regTitle").innerText = data.data.title || "父兄出欠確認アプリ";
          
          // [Level 4] 名前リストを生成してドロップダウンにセット
          const select = document.getElementById("name-list");
          select.innerHTML = ""; 
          data.list.forEach(item => {
            let opt = document.createElement("option");
            opt.value = item.id;
            opt.text = item.name;
            select.appendChild(opt);
          });
        }

      } catch (e) {
        // ----------------------------------------------------------------------------
        // [Level 3] 3. エラー・タイムアウト時のリトライ処理
        // ----------------------------------------------------------------------------
        if (retryCount < 2) {
          await new Promise(resolve => setTimeout(resolve, 500));
          return await fetchData(retryCount + 1, targetDateStr);
        }
        document.getElementById("loading").style.display = "none";
        console.error(e);
        alert("通信エラー、またはタイムアウトが発生しました\n電波の良い所で再読み込みしてください");
      }
    }

    /**
     * 初回ユーザー登録処理
     * * [Level 2] ドロップダウンで選択したユーザーIDとLINE IDを紐付けます。
     */
    async function link() {
      const sid = document.getElementById("name-list").value;
      document.getElementById("loading").style.display = "flex";
      try {
        await fetchWithTimeout(`${SETTINGS.GAS_URL}?uid=${MY_LINE_ID}&action=link&family_id=${sid}`);
        window.location.reload(); 
      } catch (e) {
        alert("登録エラーが発生しました");
        document.getElementById("loading").style.display = "none";
      }
    }

    /**
     * 変更データの保存処理
     * * [Level 2] ログイン中ユーザーの編集データのみを抽出し、GASへ送信してLIFFを閉じます。
     */
    async function saveAll() {
      if (!hasChanges) { 
        liff.closeWindow(); 
        return; 
      }
      if (isSaving) return; // 二重送信防止
      isSaving = true;

      const loader = document.getElementById("loading");
      document.getElementById("loadingText").innerText = "保存中...";
      loader.style.display = "flex";

      // ----------------------------------------------------------------------------
      // [Level 3] 送信ペイロードの生成
      // ----------------------------------------------------------------------------
      const myData = rawData.find(f => f.lineIds && f.lineIds.includes(MY_LINE_ID));
      const payload = days.map((d, i) => ({
        weekLabel: WEEK_LABEL,
        dateLabel: d.label, 
        familyId: myData.id,
        status: myData.statuses[i],
        comment: myData.commentStatus[i] || ""
      }));

      // ----------------------------------------------------------------------------
      // [Level 3] データ送信と終了処理
      // ----------------------------------------------------------------------------
      try {
        const res = await fetchWithTimeout(`${SETTINGS.GAS_URL}?action=update_all&uid=${MY_LINE_ID}&payload=${encodeURIComponent(JSON.stringify(payload))}`);
        if (!res.ok) throw new Error("HTTP Error");
        
        setTimeout(() => { liff.closeWindow(); }, 500);
      } catch (e) {
        alert("保存エラーが発生しました\n\n通信環境を確認して再度お試しください");
        loader.style.display = "none"; 
        isSaving = false;
      }
    }


    /**
     * ==============================================================================
     * [Level 1] 2. 過去データ閲覧モード用関数
     * ==============================================================================
     * 閲覧する日付（年月・月曜日）を選択・制御するためのロジック群です。
     */

    /**
     * ドロップダウン初期化・再構築
     * * [Level 2] 基準日に合わせて年・月の選択肢を生成し、イベントリスナーを登録します。
     * @param {Date|string|Event} arg - 基準日
     */
    function initDateDropdowns(arg) {
      // ----------------------------------------------------------------------------
      // [Level 3] 1. 基準日の判定（Eventオブジェクト誤爆防止）
      // ----------------------------------------------------------------------------
      let baseDate = new Date();
      if (arg instanceof Date && !isNaN(arg.getTime())) {
        baseDate = arg;
      } else if (typeof arg === 'string' && !isNaN(new Date(arg).getTime())) {
        baseDate = new Date(arg);
      }
      // [Level 4] argがEventの場合は無視して「今日」を基準にする

      const selYear = document.getElementById("sel-year");
      const selMonth = document.getElementById("sel-month");
      const selMonday = document.getElementById("sel-monday");
      if (!selYear || !selMonth) return;

      // ----------------------------------------------------------------------------
      // [Level 3] 2. 年・月の選択肢生成（再構築ロジック）
      // ----------------------------------------------------------------------------
      const currentYear = baseDate.getFullYear();
      const currentMonth = baseDate.getMonth(); 

      // [Level 4] 12月なら翌年を追加。システム開始の2026年を下限とする。
      const maxYear = (currentMonth === 11) ? currentYear + 1 : currentYear;
      const minYear = Math.max(2026, currentYear - 1);

      // [Level 4] 既存のHTMLを一度空にして生成（飛び番の不連続を解消）
      let yearHtml = "";
      for (let y = maxYear; y >= minYear; y--) {
        yearHtml += `<option value="${y}">${y}</option>`;
      }
      selYear.innerHTML = yearHtml;
      
      let monthHtml = "";
      for(let i=1; i<=12; i++) monthHtml += `<option value="${i}">${i}</option>`;
      selMonth.innerHTML = monthHtml;

      // ----------------------------------------------------------------------------
      // [Level 3] 3. イベントリスナーの設定（初回のみ）
      // ----------------------------------------------------------------------------
      if (!selYear.dataset.listener) {
        const btn = document.querySelector(".btn-show-past");
        
        selYear.addEventListener("change", () => { updateMondays(); if(btn) btn.classList.add("btn-highlight"); });
        selMonth.addEventListener("change", () => { updateMondays(); if(btn) btn.classList.add("btn-highlight"); });
        if(selMonday) {
          selMonday.addEventListener("change", () => { if(btn) btn.classList.add("btn-highlight"); });
        }
        
        selYear.dataset.listener = "true"; // 重複登録防止フラグ
      }

      updateMondays();
    }

    /**
     * 選択曜日（月曜日）リスト更新
     * * [Level 2] 選択された年月に存在する月曜日の日付を計算し、ドロップダウンを構築します。
     */
    function updateMondays() {
      const selYear = document.getElementById("sel-year");
      const selMonth = document.getElementById("sel-month");
      const selMonday = document.getElementById("sel-monday");
      if (!selYear || !selMonth || !selMonday) return;

      // [Level 4] 文字列から数値への安全なパース
      const y = parseInt(selYear.value);
      const m = parseInt(selMonth.value);
      if (isNaN(y) || isNaN(m)) return;
      
      selMonday.innerHTML = "";
      const daysInMonth = new Date(y, m, 0).getDate(); 
      for(let d=1; d<=daysInMonth; d++) {
        const date = new Date(y, m - 1, d);
        if(date.getDay() === 1) { // 月曜判定
          const opt = document.createElement("option");
          opt.value = d;
          opt.text = d;
          selMonday.appendChild(opt);
        }
      }
    }
        
    /**
     * 過去データの日付にドロップダウンを同期
     * * [Level 2] GASから指定された日付文字列(YYYY-MM-DD)に合わせてUI状態を復元します。
     * @param {string} dateStr - 復元対象の日付文字列
     */
    function setDropdownsToDate(dateStr) {
      if (!dateStr) return;
      const parts = dateStr.split("-");
      const y = parseInt(parts[0]), m = parseInt(parts[1]), d = parseInt(parts[2]);
      
      // ----------------------------------------------------------------------------
      // [Level 3] 1. リストの全生成
      // ----------------------------------------------------------------------------
      // [Level 4] 未来の年が含まれる場合に備え、該当する年を基準にリストを作り直す
      initDateDropdowns(new Date(y, m - 1, d));

      // ----------------------------------------------------------------------------
      // [Level 3] 2. 値のセットと後続処理
      // ----------------------------------------------------------------------------
      document.getElementById("sel-year").value = y;
      document.getElementById("sel-month").value = m;
      
      updateMondays(); 
      document.getElementById("sel-monday").value = d;
    }
    
    /**
     * 過去データの取得要求
     * * [Level 2] ドロップダウンの選択値を元にGASへデータ要求を送信します。
     */
    function fetchPastData() {
      document.querySelector(".btn-show-past").classList.remove("btn-highlight");

      const y = document.getElementById("sel-year").value;
      const m = String(document.getElementById("sel-month").value).padStart(2, '0');
      const d = String(document.getElementById("sel-monday").value).padStart(2, '0');
      const targetDateStr = `${y}-${m}-${d}`;
      
      document.getElementById("main-view").style.display = "none";
      document.getElementById("loading").style.display = "flex";
      document.getElementById("loadingText").innerText = "データ取得中...";
      
      fetchData(0, targetDateStr);
    }


    /**
     * ==============================================================================
     * [Level 1] 3. メインUI描画・操作関数
     * ==============================================================================
     * 取得したデータをHTMLテーブルとして構築し、クリックイベントを処理します。
     */

    /**
     * テーブル全体の描画処理
     * * [Level 2] データを走査し、集計ヘッダー、出欠セル、コメント行を動的に生成します。
     */
    function render() {
      if (!days || days.length === 0) return;

      // ----------------------------------------------------------------------------
      // [Level 3] 1. 日付ごとのステータス集計
      // ----------------------------------------------------------------------------
      const totals = days.map(() => {
        let obj = {};
        UI_CONFIG.signs.forEach(s => obj[s] = 0);
        return obj;
      });

      rawData.forEach(f => {
        f.statuses.forEach((s, i) => {
          if (totals[i].hasOwnProperty(s)) totals[i][s]++;
        });
      });

      // ----------------------------------------------------------------------------
      // [Level 3] 2. テーブルヘッダーの構築（集計表示込み）
      // ----------------------------------------------------------------------------
      let html = `<thead><tr><th class="name-col-head">団員<br>父兄</th>`;
      days.forEach((d, i) => {
        let cls = (d.label.includes("日") || d.label.includes("祝")) ? "sun" : d.label.includes("土") ? "sat" : "";
        html += `<th class="${cls}">${d.label}<div class="count-box">`;
        UI_CONFIG.signs.forEach(s => {
          html += `<div class="count-row"><span>${s}${UI_CONFIG.labels[s]}</span><span>${totals[i][s]}</span></div>`;
        });
        html += `</div></th>`;
      });
      html += "</tr></thead><tbody>";

      // ----------------------------------------------------------------------------
      // [Level 3] 3. テーブルボディ（各ユーザー行）の構築
      // ----------------------------------------------------------------------------
      rawData.forEach((f, fIdx) => {
        const isMe = (!IS_VIEW_MODE && MY_LINE_ID && f.lineIds && f.lineIds.includes(MY_LINE_ID));
        const rowClass = isMe ? 'my-row' : 'other-row';
        html += `<tr class="${rowClass}"><td class="name-cell">${f.name}</td>`;
        
        // [Level 4] ステータス（〇△×）セルの生成
        f.statuses.forEach((s, dIdx) => {
          const isLocked = days[dIdx].isLocked;
          const canEdit = !IS_VIEW_MODE && isMe;
          const clickAttr = canEdit ? `onclick="toggle(${fIdx},${dIdx})"` : "";
          const lockClass = isLocked ? "locked" : "";
          html += `<td class="status-cell status-${s} ${lockClass}" ${clickAttr}>${s}</td>`;
        });
        html += "</tr>";

        // [Level 4] コメント入力行の生成（本人行またはコメント有りの場合のみ）
        const hasComment = f.commentStatus && f.commentStatus.some(c => c && c.trim() !== "");
        if (isMe || hasComment) {
          html += `<tr class="com-row ${rowClass}"><td class="name-cell com-label"><span class="com-label-top">┗ 💬</span><span class="com-label-bottom">コメント</span></td>`;
          f.commentStatus.forEach((c, dIdx) => {
            const isLocked = days[dIdx].isLocked;
            const lockClass = isLocked ? "locked" : "";
            
            if (isMe && !IS_VIEW_MODE) {
              const icon = c ? '💬' : '＋';
              html += `<td class="${lockClass}"><span class="com-icon" onclick="openModal(${fIdx}, ${dIdx})">${icon}</span></td>`;
            } else {
              const displayTxt = c ? `<span class="com-text" onclick="viewModal('${f.name}', '${days[dIdx].label}', '${c}')">💬</span>` : '-';
              html += `<td class="${lockClass}"><span class="com-icon">${displayTxt}</span></td>`;
            }
          });
          html += "</tr>";
        }
      });

      document.getElementById("mainTable").innerHTML = html + "</tbody>";
      
      // [Level 4] テーブル描画完了後にスクロール判定を遅延実行
      setTimeout(checkScroll, 300);
    }

    /**
     * セルのステータストグル（〇→△→×→-）
     * * [Level 2] ユーザーがセルをタップした際に記号を循環させ、変更フラグを立てます。
     * @param {number} fIdx - ユーザーインデックス
     * @param {number} dIdx - 日付インデックス
     */
    function toggle(fIdx, dIdx) {
      if (days[dIdx].isLocked) {
        alert("回答期限：前日" + DEADLINE_HOUR + "時を過ぎているため変更できません"); 
        return;
      }
      
      const signs = UI_CONFIG.signs;
      const current = rawData[fIdx].statuses[dIdx];
      
      // [Level 4] 次の記号を配列から取得して更新し、再描画
      rawData[fIdx].statuses[dIdx] = signs[(signs.indexOf(current) + 1) % signs.length];
      hasChanges = true;
      render(); 
    }


    /**
     * ==============================================================================
     * [Level 1] 4. モーダル操作関連
     * ==============================================================================
     * コメントの入力・表示用モーダルウィンドウを制御します。
     */

    /**
     * 編集用モーダルを開く
     * @param {number} fIdx - ユーザーインデックス
     * @param {number} dIdx - 日付インデックス
     */
    function openModal(fIdx, dIdx) {
      if (days[dIdx].isLocked) { 
        alert("回答期限：前日" + DEADLINE_HOUR + "時を過ぎているため変更できません"); 
        return; 
      }
      currentEditFIdx = fIdx; 
      currentEditDIdx = dIdx;
      
      document.getElementById("modalTitle").innerText = days[dIdx].label + " のコメント";
      document.getElementById("modalDesc").innerText = "コメントを入力 (例: 17:30から参加)";
      document.getElementById("modalDesc").style.display = "block";
      document.getElementById("modalInput").value = rawData[fIdx].commentStatus[dIdx] || "";
      document.getElementById("modalInput").readOnly = false;
      document.getElementById("modalApplyBtn").style.display = "block";
      document.getElementById("commentModal").style.display = "flex";
      
      setTimeout(() => document.getElementById("modalInput").focus(), 100);
    }

    /**
     * 閲覧用モーダルを開く
     * @param {string} name - ユーザー名
     * @param {string} dateLabel - 日付ラベル
     * @param {string} text - コメント内容
     */
    function viewModal(name, dateLabel, text) {
      document.getElementById("modalTitle").innerText = `${name} ${dateLabel} のコメント`;
      document.getElementById("modalDesc").style.display = "none";
      document.getElementById("modalInput").value = text;
      document.getElementById("modalInput").readOnly = true;
      document.getElementById("modalApplyBtn").style.display = "none";
      document.getElementById("commentModal").style.display = "flex";
    }

    /**
     * モーダル入力値の適用
     * * [Level 2] 入力されたテキストをデータ配列に保存し、再描画します。
     */
    function applyComment() {
      if (currentEditFIdx === -1) return;
      const val = document.getElementById("modalInput").value;
      rawData[currentEditFIdx].commentStatus[currentEditDIdx] = val;
      hasChanges = true;
      closeModal(); 
      render(); 
    }

    /**
     * モーダルを閉じる
     */
    function closeModal() {
      document.getElementById("commentModal").style.display = "none";
      currentEditFIdx = -1; 
      currentEditDIdx = -1;
    }


    /**
     * ==============================================================================
     * [Level 1] 5. スクロール制御関連
     * ==============================================================================
     * 下部へのスクロール誘導や、iOS特有のバウンススクロール防止を制御します。
     */

    /**
     * スクロールインジケーターの表示判定
     * * [Level 2] スクロール位置が最下部付近に到達したかどうかで▼ボタンの表示を切り替えます。
     */
    function checkScroll() {
      const area = document.getElementById("content-area");
      const indicator = document.getElementById("scrollIndicator");
      if (!area || !indicator) return;
      
      const scrollH = Math.round(area.scrollHeight);
      const clientH = Math.round(area.clientHeight);
      const scrollT = Math.round(area.scrollTop);
      
      const canScroll = scrollH > (clientH + 3);
      // [Level 4] 下端に到達しているか判定（10pxの余裕を持たせる）
      const isBottom = (scrollH - scrollT) <= (clientH + 10);
      
      if (canScroll && !isBottom) {
        indicator.style.display = "block";
      } else {
        indicator.style.display = "none";
      }
    }

    document.getElementById("content-area").addEventListener("scroll", checkScroll);
    window.addEventListener("resize", checkScroll);

    /**
     * テーブル最下部へのスムーススクロール実行
     * * [Level 2] requestAnimationFrameを使用し、指定時間かけて滑らかに移動させます。
     * @param {HTMLElement} element - スクロール対象
     * @param {number} duration - アニメーション時間(ms)
     */
    function slowScrollToBottom(element, duration) {
      const table = element.querySelector('table');
      const start = element.scrollTop;
      
      // ----------------------------------------------------------------------------
      // [Level 3] 目標座標の算出
      // ----------------------------------------------------------------------------
      // [Level 4] scrollHeightではなく純粋な表の高さ(offsetHeight)を使用し、下部余白を除外
      const tableHeight = table.offsetHeight;
      const target = tableHeight - element.clientHeight;
      const distance = target - start;

      if (distance <= 0) return;

      // [Level 4] CSSのsmooth指定と干渉しないよう、一時的にautoに設定
      const originalStyle = element.style.scrollBehavior;
      element.style.scrollBehavior = 'auto'; 

      let startTime = null;

      // ----------------------------------------------------------------------------
      // [Level 3] アニメーションループ関数
      // ----------------------------------------------------------------------------
      function animation(currentTime) {
        if (startTime === null) startTime = currentTime;
        const timeElapsed = currentTime - startTime;
        
        const run = easeInOutQuad(timeElapsed, start, distance, duration);
        element.scrollTop = run;

        if (timeElapsed < duration) {
          requestAnimationFrame(animation);
        } else {
          element.scrollTop = target;
          element.style.scrollBehavior = originalStyle;
        }
      }

      // [Level 4] イージング関数（二次関数を用いた加減速）
      function easeInOutQuad(t, b, c, d) {
        t /= d / 2;
        if (t < 1) return c / 2 * t * t + b;
        t--;
        return -c / 2 * (t * (t - 2) - 1) + b;
      }

      requestAnimationFrame(animation);
    }

    // インジケーター（▼ボタン）のクリックイベント
    document.getElementById("scrollIndicator").onclick = function() {
      const area = document.getElementById("content-area");
      slowScrollToBottom(area, 1000); 
    };

    /**
     * 全体バウンススクロールの防止 (iOS対応)
     * * [Level 2] 画面が引っ張られてリロードされるのを防ぎつつ、テーブル等内部のスクロールは許可します。
     */
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) return; // ピンチズーム等は許可
      if (!e.target.closest('.table-wrapper') && !e.target.closest('.modal')) { 
        e.preventDefault(); 
      }
    }, { passive: false });

    // アプリの起動
    window.onload = init;
  </script>
</body>
</html>
