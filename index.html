<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFF-GAS 連携テスト</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="padding: 20px; font-family: sans-serif; line-height: 1.6;">
  <h2>LIFF-GAS 連携テスト</h2>
  <div id="status" style="padding: 10px; background: #f0f0f0; border-radius: 5px;">初期化中...</div>
  <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; white-space: pre-wrap;"></div>

  <script>
    const liffId = "2009266487-GEiMe9Ei";
    const gasUrl = "https://script.google.com/macros/s/AKfycbxotMGrvWrOq0j8RJ3tfntjiCBulOobkPOPTrKGO7dpp_UESD-U8KYcNI8YnBH_C91q/exec"; 

    window.onload = function() {
      liff.init({ liffId: liffId })
        .then(() => {
          document.getElementById('status').innerText = "LIFF初期化成功！データ取得中...";
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            const uid = liff.getContext().userId;
            
            // GASへデータを問い合わせる
            fetch(`${gasUrl}?uid=${uid}`)
              .then(res => res.json())
              .then(data => {
                document.getElementById('status').innerText = "GAS連携成功！";
                document.getElementById('result').innerText = 
                  `取得したUID: ${data.uid}\nGASからの返信: ${data.message}`;
              })
              .catch(err => {
                document.getElementById('status').innerText = "GAS通信エラー";
                document.getElementById('result').innerText = err;
              });
          }
        })
        .catch(err => {
          document.getElementById('status').innerText = "LIFFエラー: " + err;
        });
    };
  </script>
</body>
</html>
</html>
