<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --main-green: #27ae60; --bg-light: #f4f7f8; --my-row-bg: #fffbe6; }
    html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; margin: 0; background: var(--bg-light); }
    .container { padding: 0; display: flex; flex-direction: column; height: 100dvh; }
    .table-wrapper { flex: 1; overflow-y: auto; background: white; margin-bottom: 0; }
    /* 閲覧モード時はフッター分を詰め、通常時は入力欄用に140px確保 */
    .has-footer { margin-bottom: 140px; }
    
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    thead { position: sticky; top: 0; z-index: 10; }
    th { background: var(--main-green); color: white; padding: 6px 0; font-size: 11px; border: none; }
    td { border-bottom: 1px solid #eee; text-align: center; }
    
    /* セル設定 */
    .name-cell { width: 70px; font-weight: bold; font-size: 12px; text-align: left; padding-left: 4px; border-right: 2px solid var(--main-green); }
    .status-row { height: 40px; }
    .comment-row { height: 25px; border-bottom: 2px solid #ddd; }
    .comment-label { font-size: 10px; color: #7f8c8d; background: #f9f9f9; width: 70px; text-align: left; padding-left: 4px; border-right: 2px solid #ccc; }
    
    .status-cell { font-size: 20px; cursor: pointer; }
    .locked { background-color: #f0f0f0 !important; color: #aaa !important; cursor: default; }
    .comment-btn { font-size: 11px; color: #2980b9; text-decoration: underline; cursor: pointer; }
    .my-row { background-color: var(--my-row-bg) !important; }

    /* 下部コメント掲示板 */
    .comment-board { padding: 10px; background: #fff; border-top: 2px solid var(--main-green); font-size: 12px; }
    .comment-item { margin-bottom: 6px; border-bottom: 1px dashed #eee; padding-bottom: 4px; word-break: break-all; }
    .comment-date-tag { font-weight: bold; color: var(--main-green); }

    /* 入力フッター（デフォルト非表示） */
    .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 8px; background: white; border-top: 1px solid #ddd; z-index: 100; box-sizing: border-box; display: none; }
    textarea { width: 100%; height: 65px; border: 1px solid #ccc; border-radius: 4px; padding: 6px; font-size: 13px; box-sizing: border-box; margin-bottom: 6px; resize: none; }
    .btn-save { width: 100%; background: var(--main-green); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; }
    #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
  </style>
</head>
<body>
  <div id="loading"><div>読込中...</div></div>

  <div id="registration-view" style="display:none; padding:20px; text-align:center;">
    <h3>初回登録</h3>
    <select id="name-list" style="width:100%; padding:12px; margin:15px 0;"></select>
    <button class="btn-save" onclick="link()">登録する</button>
  </div>

  <div class="container" id="main-view" style="display:none;">
    <h3 id="weekTitle" style="text-align:center; margin:4px 0; font-size:14px;"></h3>
    <div id="wrapper" class="table-wrapper">
      <table id="mainTable"></table>
      <div id="commentBoard" class="comment-board"></div>
    </div>
    
    <div id="footer" class="footer-bar">
      <textarea id="comment-box" placeholder="コメントを入力"></textarea>
      <button id="save-btn" class="btn-save" onclick="saveAll()">変更を保存して閉じる</button>
    </div>
  </div>

  <script>
    const SETTINGS = { GAS_URL: "★GASのURL★", LIFF_ID: "★LIFFのID★" };
    let MY_LINE_ID = "", IS_VIEW_MODE = false, MY_NAME = "", GLOBAL_ALL_COMMENTS = [];
    let days = [], rawData = [];

    async function init() {
      const params = new URLSearchParams(window.location.search);
      IS_VIEW_MODE = (params.get('mode') === 'view');
      if (!IS_VIEW_MODE) {
        await liff.init({ liffId: SETTINGS.LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const p = await liff.getProfile(); MY_LINE_ID = p.userId;
      }
      fetchData();
    }

    async function fetchData() {
      const url = `${SETTINGS.GAS_URL}?uid=${MY_LINE_ID}&action=get&mode=${IS_VIEW_MODE?'view':''}`;
      const res = await fetch(url);
      const data = await res.json();
      
      if (data.status === "success") {
        days = data.data.dates;
        rawData = data.data.families;
        GLOBAL_ALL_COMMENTS = data.data.allComments; // グローバルに保存
        document.getElementById("weekTitle").innerText = data.data.weekLabel + (IS_VIEW_MODE ? " (閲覧モード)":"");
        document.getElementById("comment-box").value = data.data.myComment || "";
        
        const myFamily = rawData.find(f => f.lineIds.includes(MY_LINE_ID));
        if (myFamily) MY_NAME = myFamily.name;

        if (!IS_VIEW_MODE) document.getElementById("wrapper").classList.add("has-footer");
        
        render();
        document.getElementById("main-view").style.display = "flex";
        document.getElementById("loading").style.display = "none";
      } else {
        document.getElementById("loading").style.display = "none";
        document.getElementById("registration-view").style.display = "block";
        const sel = document.getElementById("name-list");
        data.list.forEach(i => sel.add(new Option(i.name, i.id)));
      }
    }

    function render() {
      let html = `<thead><tr><th style="width:70px">氏名</th>`;
      days.forEach(d => html += `<th class="${d.isLocked?'locked':''}">${d.label}</th>`);
      html += "</tr></thead><tbody>";

      rawData.forEach((f, fIdx) => {
        const isMe = f.lineIds.includes(MY_LINE_ID);
        const rowCls = isMe ? 'my-row' : '';

        // 1段目：出欠〇×行
        html += `<tr class="status-row ${rowCls}"><td class="name-cell">${f.name}</td>`;
        f.statuses.forEach((s, dIdx) => {
          const locked = days[dIdx].isLocked;
          const click = (!IS_VIEW_MODE && !locked && isMe) ? `onclick="toggle(${fIdx},${dIdx})"` : "";
          html += `<td class="status-cell ${locked?'locked':''}" ${click}>${s}</td>`;
        });
        html += "</tr>";

        // 2段目：コメント行
        html += `<tr class="comment-row ${rowCls}"><td class="comment-label">└ コメント</td>`;
        days.forEach((d, dIdx) => {
          const locked = days[dIdx].isLocked;
          // 自分かつ閲覧モードでない場合のみ「コメント」リンクを表示
          const btn = (!IS_VIEW_MODE && isMe) ? `<span class="comment-btn" onclick="showInput('${d.label}')">コメント</span>` : "";
          html += `<td class="${locked?'locked':''}">${btn}</td>`;
        });
        html += "</tr>";
      });
      document.getElementById("mainTable").innerHTML = html + "</tbody>";

      // コメント掲示板
      let cHtml = "<strong>【コメント一覧】</strong><br>";
      if (GLOBAL_ALL_COMMENTS.length === 0) cHtml += "（なし）";
      GLOBAL_ALL_COMMENTS.forEach(c => {
        const text = c.text.replace(/\[(.*?)\]/g, '<span class="comment-date-tag">[$1]</span>');
        cHtml += `<div class="comment-item"><strong>${c.name}</strong>: ${text}</div>`;
      });
      document.getElementById("commentBoard").innerHTML = cHtml;
    }

    function toggle(fIdx, dIdx) {
      const signs = ["〇", "△", "×", "-"];
      rawData[fIdx].statuses[dIdx] = signs[(signs.indexOf(rawData[fIdx].statuses[dIdx]) + 1) % signs.length];
      render();
    }

    // コメントリンクが押されたら入力欄を表示し、日付をセット
    function showInput(dateLabel) {
      const footer = document.getElementById("footer");
      footer.style.display = "block";
      const box = document.getElementById("comment-box");
      const tag = `[${dateLabel}] ${MY_NAME}：`;
      if (!box.value.includes(tag)) {
        box.value += (box.value ? "\n" : "") + tag;
      }
      box.focus();
    }

    async function saveAll() {
      document.getElementById("loading").style.display = "flex";
      const myData = rawData.find(f => f.lineIds.includes(MY_LINE_ID));
      const payload = days.map((d, i) => ({ dateLabel: d.label, status: myData.statuses[i] }));
      const url = `${SETTINGS.GAS_URL}?action=update_all&uid=${MY_LINE_ID}&familyId=${myData.id}&payload=${encodeURIComponent(JSON.stringify(payload))}&comment=${encodeURIComponent(document.getElementById("comment-box").value)}`;
      await fetch(url);
      liff.closeWindow();
    }

    async function link() {
      const id = document.getElementById("name-list").value;
      await fetch(`${SETTINGS.GAS_URL}?uid=${MY_LINE_ID}&action=link&family_id=${id}`);
      window.location.reload();
    }

    window.onload = init;
  </script>
</body>
</html>
