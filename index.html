<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --main: #27ae60; --sat: #2980b9; --sun: #d35400; --bg: #f4f7f8;
      --my-row: #fffbe6; --name-w: 85px;
    }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: var(--bg); }
    .container { display: flex; flex-direction: column; height: 100dvh; }
    
    /* テーブルレイアウト：氏名列固定 */
    .table-wrapper { flex: 1; overflow: auto; background: white; position: relative; }
    table { border-collapse: separate; border-spacing: 0; width: 100%; }
    
    thead th { 
      position: sticky; top: 0; z-index: 10; background: var(--main); color: white; 
      padding: 6px 2px; font-size: 11px; border-bottom: 1px solid #ddd;
    }
    thead th:first-child { left: 0; z-index: 11; width: var(--name-w); min-width: var(--name-w); }
    
    .name-cell { 
      position: sticky; left: 0; z-index: 5; background: #fafafa; 
      width: var(--name-w); min-width: var(--name-w); font-size: 12px; font-weight: bold;
      padding: 10px 4px; border-right: 2px solid var(--main); border-bottom: 1px solid #eee;
      text-align: left; box-sizing: border-box;
    }
    
    td { text-align: center; border-bottom: 1px solid #eee; height: 50px; }
    .status-cell { font-size: 24px; cursor: pointer; user-select: none; }
    .locked { background: #f0f0f0 !important; color: #aaa !important; cursor: default; }
    .my-row { background: var(--my-row) !important; }
    .my-row .name-cell { background: var(--my-row) !important; }

    /* 集計表示 */
    .count-box { font-size: 9px; margin-top: 4px; background: rgba(0,0,0,0.1); border-radius: 3px; padding: 2px; font-weight: normal; }
    .count-line { display: flex; justify-content: space-between; padding: 0 2px; }

    /* コメント行 */
    .com-row { height: 36px; background: #fff; }
    .com-label { font-size: 10px; color: #888; text-align: right; padding-right: 8px; border-right: 2px solid #ccc; }
    .com-icon { font-size: 18px; cursor: pointer; display: block; width: 100%; height: 100%; line-height: 36px; }

    /* フッター・ボタン */
    .footer { padding: 10px; background: white; border-top: 1px solid #ddd; z-index: 100; }
    .btn-save { width: 100%; background: var(--main); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; }

    /* モーダル */
    .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; z-index:1000; align-items:center; justify-content:center; }
    .modal-content { background:white; width:90%; border-radius:12px; padding:20px; box-sizing:border-box; }
    .modal-title { font-weight:bold; margin-bottom:15px; border-bottom:2px solid var(--main); padding-bottom:5px; }
    .edit-item { display:flex; margin-bottom:10px; align-items:center; }
    .edit-label { width:80px; font-size:12px; }
    .edit-input { flex:1; padding:8px; border:1px solid #ccc; border-radius:5px; font-size:14px; }
    .modal-btns { display:flex; gap:10px; margin-top:20px; }
    .btn-m { flex:1; padding:12px; border:none; border-radius:8px; font-weight:bold; }

    #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    .spinner { width:40px; height:40px; border:4px solid #f3f3f3; border-top:4px solid var(--main); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p>読込中...</p></div>

  <div id="registration-view" style="display:none; padding:40px 20px; text-align:center;">
    <h3 id="regTitle">初期登録</h3>
    <select id="name-list" style="width:100%; padding:15px; margin-bottom:20px; font-size:16px;"></select>
    <button class="btn-save" onclick="link()">登録を完了する</button>
  </div>

  <div class="container" id="main-view" style="display:none;">
    <h3 id="weekTitle" style="text-align:center; margin:10px 0;"></h3>
    <div class="table-wrapper">
      <table id="mainTable"></table>
    </div>
    <div class="footer" id="footer-area">
      <button class="btn-save" onclick="save()">変更を保存して閉じる</button>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <div id="m-title" class="modal-title"></div>
      <div id="m-body"></div>
      <div class="modal-btns">
        <button class="btn-m" style="background:#eee" onclick="closeM()">戻る</button>
        <button id="m-save-btn" class="btn-m" style="background:var(--main);color:white;" onclick="applyM()">反映</button>
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      GAS_URL: "https://script.google.com/macros/s/AKfycbyK70SuUPhT2tt5htRxPlCHAySTSzT7TfPFmRg8S4vuS6HP7eM03Uw_r3u8D_nQdjSb/exec",
      LIFF_ID: "2009266487-GEiMe9Ei",
      SIGNS: ["〇", "△", "×", "-"]
    };

    let MY_UID = "", IS_VIEW = false, DATES = [], FAMILIES = [];

    async function init() {
      const p = new URLSearchParams(location.search);
      IS_VIEW = (p.get('mode') === 'view');
      if (!IS_VIEW) {
        await liff.init({ liffId: CONFIG.LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        MY_UID = (await liff.getProfile()).userId;
      }
      fetchData();
    }

    async function fetchData() {
      try {
        const res = await fetch(`${CONFIG.GAS_URL}?uid=${MY_UID}&action=get&mode=${IS_VIEW?'view':''}`);
        const json = await res.json();
        if (json.status === "success") {
          DATES = json.data.dates;
          FAMILIES = json.data.families;
          document.getElementById("weekTitle").innerText = json.data.weekLabel + (IS_VIEW ? " (閲覧)" : "");
          if (IS_VIEW) document.getElementById("footer-area").style.display = "none";
          render();
          document.getElementById("main-view").style.display = "flex";
        } else if (json.status === "unregistered") {
          const sel = document.getElementById("name-list");
          json.list.forEach(f => sel.add(new Option(f.name, f.id)));
          document.getElementById("registration-view").style.display = "block";
        }
      } catch (e) { alert("通信エラー: " + e); }
      document.getElementById("loading").style.display = "none";
    }

    function render() {
      // 集計計算
      const totals = DATES.map(() => ({ "〇":0, "△":0, "×":0, "-":0 }));
      FAMILIES.forEach(f => f.statuses.forEach((s, i) => totals[i][s]++));

      let h = `<thead><tr><th>氏名</th>`;
      DATES.forEach((d, i) => {
        h += `<th>${d.label}<div class="count-box">`;
        CONFIG.SIGNS.forEach(s => h += `<div class="count-line"><span>${s}</span><span>${totals[i][s]}</span></div>`);
        h += `</div></th>`;
      });
      h += `</tr></thead><tbody>`;

      FAMILIES.forEach((f, fi) => {
        const isMe = f.lineIds.includes(MY_UID);
        const rowCls = isMe ? "my-row" : "";
        
        // 出欠行
        h += `<tr class="${rowCls}"><td class="name-cell">${f.name}</td>`;
        f.statuses.forEach((s, di) => {
          const lock = DATES[di].isLocked;
          const act = (!IS_VIEW && isMe && !lock) ? `onclick="toggle(${fi},${di})"` : "";
          h += `<td class="status-cell ${lock?'locked':''}" ${act}>${s}</td>`;
        });
        h += "</tr>";

        // コメント行
        const hasCom = f.commentStatus.some(c => c && c.trim() !== "");
        if ((!IS_VIEW && isMe) || hasCom) {
          h += `<tr class="com-row ${rowCls}"><td class="name-cell com-label">└ 💬</td>`;
          DATES.forEach((d, di) => {
            const txt = f.commentStatus[di];
            const lock = d.isLocked;
            let inner = "-";
            if (!IS_VIEW && isMe) {
              inner = `<span class="com-icon" onclick="openEdit()">${txt?'💬':'＋'}</span>`;
            } else if (txt) {
              inner = `<span class="com-icon" onclick="viewCom('${f.name}','${d.label}','${txt.replace(/\n/g,'<br>')}')">💬</span>`;
            }
            h += `<td class="${lock?'locked':''}">${inner}</td>`;
          });
          h += "</tr>";
        }
      });
      document.getElementById("mainTable").innerHTML = h + "</tbody>";
    }

    function toggle(fi, di) {
      const cur = FAMILIES[fi].statuses[di];
      FAMILIES[fi].statuses[di] = CONFIG.SIGNS[(CONFIG.SIGNS.indexOf(cur)+1)%CONFIG.SIGNS.length];
      render();
    }

    function openEdit() {
      const me = FAMILIES.find(f => f.lineIds.includes(MY_UID));
      document.getElementById("m-title").innerText = "コメント編集";
      document.getElementById("m-save-btn").style.display = "block";
      let h = "";
      DATES.forEach((d, i) => {
        h += `<div class="edit-item"><div class="edit-label">${d.label}</div>
              <input id="edit-${i}" class="edit-input" value="${me.commentStatus[i]||''}" placeholder="特記事項なし"></div>`;
      });
      document.getElementById("m-body").innerHTML = h;
      document.getElementById("modal").style.display = "flex";
    }

    function viewCom(n, d, t) {
      document.getElementById("m-title").innerText = `${n} (${d})`;
      document.getElementById("m-body").innerHTML = `<div style="padding:10px;background:#f9f9f9;border-radius:5px;">${t}</div>`;
      document.getElementById("m-save-btn").style.display = "none";
      document.getElementById("modal").style.display = "flex";
    }

    function applyM() {
      const me = FAMILIES.find(f => f.lineIds.includes(MY_UID));
      DATES.forEach((_, i) => me.commentStatus[i] = document.getElementById(`edit-${i}`).value);
      closeM(); render();
    }

    function closeM() { document.getElementById("modal").style.display = "none"; }

    async function save() {
      document.getElementById("loading").style.display = "flex";
      const me = FAMILIES.find(f => f.lineIds.includes(MY_UID));
      const payload = {
        att: DATES.map((d, i) => ({ dateLabel: d.label, status: me.statuses[i] })),
        com: DATES.map((d, i) => ({ dateLabel: d.label, text: me.commentStatus[i] }))
      };
      try {
        const url = `${CONFIG.GAS_URL}?action=update_all&uid=${MY_UID}&familyId=${me.id}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
        await fetch(url);
        liff.closeWindow();
      } catch (e) { alert("保存失敗: " + e); document.getElementById("loading").style.display = "none"; }
    }

    async function link() {
      const fid = document.getElementById("name-list").value;
      if (!fid) return;
      document.getElementById("loading").style.display = "flex";
      await fetch(`${CONFIG.GAS_URL}?uid=${MY_UID}&action=link&family_id=${fid}`);
      location.reload();
    }

    window.onload = init;
  </script>
</body>
</html>
