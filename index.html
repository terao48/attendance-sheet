<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --main-green: #27ae60; --bg-light: #f4f7f8; --my-row-bg: #fffbe6; }
    html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; margin: 0; background: var(--bg-light); }
    .container { padding: 4px; display: flex; flex-direction: column; height: 100dvh; box-sizing: border-box; }
    .table-wrapper { flex: 1; overflow-y: auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 140px; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    thead { position: sticky; top: 0; z-index: 10; }
    th { background: var(--main-green); color: white; padding: 4px 0; font-size: 11px; }
    td { border-bottom: 1px solid #eee; height: 55px; text-align: center; }
    .name-cell { width: 70px; font-weight: bold; font-size: 12px; text-align: left; padding-left: 4px; border-right: 2px solid var(--main-green); }
    .my-row { background-color: var(--my-row-bg) !important; }
    .status-cell { font-size: 22px; cursor: pointer; position: relative; }
    .locked { background-color: #f0f0f0 !important; color: #aaa !important; cursor: default; }
    .comment-trigger { font-size: 14px; display: block; margin-top: -4px; color: #2980b9; }
    
    /* 下部コメント表示エリア（閲覧モード用） */
    .comment-board { padding: 10px; background: #fff; border-top: 2px solid var(--main-green); font-size: 12px; }
    .comment-item { margin-bottom: 8px; border-bottom: 1px dashed #ccc; padding-bottom: 4px; }
    .comment-date-tag { font-weight: bold; color: var(--main-green); margin-right: 5px; }

    .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 8px; background: white; border-top: 1px solid #ddd; z-index: 100; box-sizing: border-box; }
    textarea { width: 100%; height: 60px; border: 1px solid #ccc; border-radius: 4px; padding: 6px; font-size: 13px; box-sizing: border-box; margin-bottom: 6px; }
    .btn-save { width: 100%; background: var(--main-green); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; }
    #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
  </style>
</head>
<body>
  <div id="loading"><div>読込中...</div></div>

  <div id="registration-view" style="display:none; padding:20px; text-align:center;">
    <h3>初回登録</h3>
    <select id="name-list" style="width:100%; padding:12px; margin:15px 0;"></select>
    <button class="btn-save" onclick="link()">登録する</button>
  </div>

  <div class="container" id="main-view" style="display:none;">
    <h3 id="weekTitle" style="text-align:center; margin:5px 0; font-size:14px;"></h3>
    <div class="table-wrapper">
      <table id="mainTable"></table>
      <div id="commentBoard" class="comment-board"></div>
    </div>
    
    <div id="footer" class="footer-bar">
      <textarea id="comment-box" placeholder="連絡事項を入力"></textarea>
      <button id="save-btn" class="btn-save" onclick="saveAll()">保存して閉じる</button>
    </div>
  </div>

  <script>
    const SETTINGS = { GAS_URL: "https://script.google.com/macros/s/AKfycbyK70SuUPhT2tt5htRxPlCHAySTSzT7TfPFmRg8S4vuS6HP7eM03Uw_r3u8D_nQdjSb/exec", LIFF_ID: "2009266487-GEiMe9Ei" };
    let MY_LINE_ID = "", IS_VIEW_MODE = false, MY_NAME = "";
    let days = [], rawData = [];

    async function init() {
      const params = new URLSearchParams(window.location.search);
      IS_VIEW_MODE = (params.get('mode') === 'view');
      if (!IS_VIEW_MODE) {
        await liff.init({ liffId: SETTINGS.LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const p = await liff.getProfile(); MY_LINE_ID = p.userId;
      }
      fetchData();
    }

    async function fetchData() {
      const url = `${SETTINGS.GAS_URL}?uid=${MY_LINE_ID}&action=get&mode=${IS_VIEW_MODE?'view':''}`;
      const res = await fetch(url);
      const data = await res.json();
      
      if (data.status === "success") {
        days = data.data.dates;
        rawData = data.data.families;
        document.getElementById("weekTitle").innerText = data.data.weekLabel;
        document.getElementById("comment-box").value = data.data.myComment || "";
        
        const myFamily = rawData.find(f => f.lineIds.includes(MY_LINE_ID));
        if (myFamily) MY_NAME = myFamily.name;

        if (IS_VIEW_MODE) document.getElementById("footer").style.display = "none";
        
        render(data.data.allComments);
        document.getElementById("main-view").style.display = "flex";
        document.getElementById("loading").style.display = "none";
      } else {
        document.getElementById("loading").style.display = "none";
        document.getElementById("registration-view").style.display = "block";
        const sel = document.getElementById("name-list");
        data.list.forEach(i => sel.add(new Option(i.name, i.id)));
      }
    }

    function render(allComments) {
      let html = `<thead><tr><th style="width:70px">氏名</th>`;
      days.forEach(d => html += `<th class="${d.isLocked?'locked':''}">${d.label}</th>`);
      html += "</tr></thead><tbody>";

      rawData.forEach((f, fIdx) => {
        const isMe = f.lineIds.includes(MY_LINE_ID);
        html += `<tr class="${isMe?'my-row':''}">`;
        html += `<td class="name-cell">${f.name}</td>`;
        f.statuses.forEach((s, dIdx) => {
          const locked = days[dIdx].isLocked;
          const click = (!IS_VIEW_MODE && !locked && isMe) ? `onclick="toggle(${fIdx},${dIdx})"` : "";
          const commentBtn = (!IS_VIEW_MODE && isMe) ? `<span class="comment-trigger" onclick="prepComment('${days[dIdx].label}')">💬</span>` : "";
          html += `<td class="status-cell ${locked?'locked':''}" ${click}>${s}${commentBtn}</td>`;
        });
        html += "</tr>";
      });
      document.getElementById("mainTable").innerHTML = html + "</tbody>";

      // コメント掲示板の描画
      let cHtml = "<strong>【連絡事項】</strong><br>";
      if (allComments.length === 0) cHtml += "なし";
      allComments.forEach(c => {
        // [3/24] のような形式を強調
        const text = c.text.replace(/\[(.*?)\]/g, '<span class="comment-date-tag">[$1]</span>');
        cHtml += `<div class="comment-item"><strong>${c.name}</strong>: ${text}</div>`;
      });
      document.getElementById("commentBoard").innerHTML = cHtml;
    }

    function toggle(fIdx, dIdx) {
      const signs = ["〇", "△", "×", "-"];
      rawData[fIdx].statuses[dIdx] = signs[(signs.indexOf(rawData[fIdx].statuses[dIdx]) + 1) % signs.length];
      render([]); // 簡易再描画（コメントは維持）
    }

    function prepComment(dateLabel) {
      const box = document.getElementById("comment-box");
      const tag = `[${dateLabel}] ${MY_NAME}：`;
      if (!box.value.includes(tag)) {
        box.value += (box.value ? "\n" : "") + tag;
      }
      box.focus();
    }

    async function saveAll() {
      document.getElementById("loading").style.display = "flex";
      const myData = rawData.find(f => f.lineIds.includes(MY_LINE_ID));
      const payload = days.map((d, i) => ({ dateLabel: d.label, status: myData.statuses[i] }));
      const url = `${SETTINGS.GAS_URL}?action=update_all&uid=${MY_LINE_ID}&familyId=${myData.id}&payload=${encodeURIComponent(JSON.stringify(payload))}&comment=${encodeURIComponent(document.getElementById("comment-box").value)}`;
      await fetch(url);
      liff.closeWindow();
    }

    async function link() {
      const id = document.getElementById("name-list").value;
      await fetch(`${SETTINGS.GAS_URL}?uid=${MY_LINE_ID}&action=link&family_id=${id}`);
      window.location.reload();
    }

    window.onload = init;
  </script>
</body>
</html>
