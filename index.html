<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --main-green: #27ae60; --sat-blue: #2980b9; --sun-red: #d35400;
      --bg-light: #f4f7f8; --my-row-bg: #fffbe6; --name-col-width: 80px;
    }
    body { font-family: sans-serif; margin: 0; background: var(--bg-light); color: #333; }
    .container { padding: 5px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
    h3 { text-align: center; font-size: 16px; margin: 10px 0; }
    .table-wrapper { flex: 1; overflow-y: auto; overflow-x: hidden; border-radius: 8px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    thead { position: sticky; top: 0; z-index: 10; }
    th { background: var(--main-green); color: white; padding: 5px 0; font-size: 12px; }
    .name-col-head { width: var(--name-col-width); }
    th.sat { background: var(--sat-blue); } 
    th.sun { background: var(--sun-red); } 
    .count-box { font-size: 10px; margin-top: 2px; font-weight: normal; }
    
    /* 行の高さ：文字サイズを維持しつつ、余白を調整 */
    td { border-bottom: 1px solid #eee; height: 35px; text-align: center; vertical-align: middle; }
    .name-cell { width: var(--name-col-width); padding: 0 4px; font-weight: bold; font-size: 13px; text-align: left; background: #fafafa; border-right: 1px solid #ddd; }
    .my-row { background-color: var(--my-row-bg) !important; }
    .status-cell { font-size: 20px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    
    /* 表示専用モード時のスタイル設定 */
    .view-mode .status-cell { cursor: default; }

    .status-〇 { color: var(--main-green); font-weight: bold; } 
    .status-△ { color: #f39c12; font-weight: bold; }
    .status-× { color: #7f8c8d; font-weight: bold; }
    .status-- { color: #ccc; }
    
    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; display: none; z-index: 1000; }
    #registration-view { display: none; padding: 20px; text-align: center; }
    .btn-link { background: var(--main-green); color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; font-size: 16px; margin-top: 10px; }
  </style>
</head>
<body id="bodyTag">
  
  <div id="registration-view">
    <h3>初回登録</h3>
    <p style="font-size:14px;">名簿から自分の名前を選んでください。</p>
    <select id="name-list" style="width:100%; padding:10px; font-size:16px;"></select>
    <button class="btn-link" onclick="link()">登録を完了する</button>
  </div>

  <div class="container" id="main-view" style="display:none;">
    <h3 id="weekTitle">読込中...</h3>
    <div class="table-wrapper">
      <table id="mainTable"></table>
    </div>
  </div>
  
  <div id="toast"></div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzv2Rt6QfjdDQjfHUFhTgAyv4x8Iagh88AMxcGXn5bgv40sOZZoNm5_I5QIaX7jFN_I/exec"; 
  const LIFF_ID = "2009266487-GEiMe9Ei";

  let MY_LINE_ID = "";
  let IS_VIEW_MODE = false; // 表示専用モードフラグ
  const UI_CONFIG = {
    signs: ["〇", "△", "×", "-"],
  };
  let rawData = []; 
  let days = [];    

  async function init() {
    // URLパラメータからモードを取得
    const params = new URLSearchParams(window.location.search);
    IS_VIEW_MODE = params.get('mode') === 'view';
    
    if (IS_VIEW_MODE) {
      document.getElementById("bodyTag").classList.add("view-mode");
    }

    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      MY_LINE_ID = profile.userId;

      const res = await fetch(`${GAS_URL}?uid=${MY_LINE_ID}&action=get`);
      const data = await res.json();

      if (data.status === "success") {
        document.getElementById("main-view").style.display = "flex";
        document.getElementById("weekTitle").innerText = data.data.weekLabel + (IS_VIEW_MODE ? " (閲覧用)" : "");
        days = data.data.dates;
        
        // モードによる並び替えの分岐
        if (IS_VIEW_MODE) {
          // 表示モード：名簿順（スプレッドシートの並び）のまま
          rawData = data.data.families;
        } else {
          // 入力モード：自分を一番上に持ってくる
          const myData = data.data.families.find(f => f.lineId === MY_LINE_ID);
          const otherData = data.data.families.filter(f => f.lineId !== MY_LINE_ID);
          rawData = myData ? [myData, ...otherData] : data.data.families;
        }
        
        render();
      } else if (data.status === "unregistered") {
        document.getElementById("registration-view").style.display = "block";
        const select = document.getElementById("name-list");
        data.list.forEach(item => {
          const opt = document.createElement("option");
          opt.value = item.id; opt.text = item.name;
          select.appendChild(opt);
        });
      }
    } catch (e) {
      console.error(e);
      document.getElementById("weekTitle").innerText = "エラーが発生しました";
    }
  }

  async function link() {
    const fid = document.getElementById("name-list").value;
    const res = await fetch(`${GAS_URL}?uid=${MY_LINE_ID}&action=link&family_id=${fid}`);
    await res.json();
    location.reload();
  }

  function render() {
    const totals = days.map(() => {
      let obj = {}; UI_CONFIG.signs.forEach(s => obj[s] = 0); return obj;
    });

    rawData.forEach(f => {
      f.statuses.forEach((s, i) => { if (totals[i].hasOwnProperty(s)) totals[i][s]++; });
    });

    let html = `<thead><tr><th class="name-col-head">氏名</th>`;
    days.forEach((d, i) => {
      let cls = (d.includes("日") || d.includes("祝")) ? "sun" : d.includes("土") ? "sat" : "";
      html += `<th class="${cls}">${d.replace("月","").replace("日","")}<div class="count-box">〇:${totals[i]["〇"]}</div></th>`;
    });
    html += "</tr></thead><tbody>";

    rawData.forEach((f, fIdx) => {
      const isMe = (f.lineId === MY_LINE_ID);
      html += `<tr class="${isMe ? 'my-row' : ''}"><td class="name-cell">${f.name}</td>`;
      f.statuses.forEach((s, i) => {
        // 表示モードならonclickを無効化
        const clickHandler = IS_VIEW_MODE ? "" : `onclick="toggle(${fIdx},${i})"`;
        html += `<td class="status-cell status-${s}" ${clickHandler}>${s}</td>`;
      });
      html += "</tr>";
    });
    document.getElementById("mainTable").innerHTML = html + "</tbody>";
  }

  async function toggle(fIdx, dIdx) {
    if (IS_VIEW_MODE) return; // 念のためのガード

    const cycle = UI_CONFIG.signs;
    let next = cycle[(cycle.indexOf(rawData[fIdx].statuses[dIdx]) + 1) % cycle.length];
    
    rawData[fIdx].statuses[dIdx] = next; 
    render(); 
    showToast("更新中...");
    
    const res = await fetch(`${GAS_URL}?uid=${MY_LINE_ID}&action=update&familyId=${rawData[fIdx].id}&dateLabel=${encodeURIComponent(days[dIdx])}&status=${encodeURIComponent(next)}`);
    const data = await res.json();
    showToast(data.message);
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg; t.style.display = "block";
    setTimeout(() => t.style.display = "none", 1200);
  }

  window.onload = init;
</script>
</body>
</html>
