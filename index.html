<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>父兄出欠確認アプリ</title> 
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    /* ==========================================
     * CSS変数の定義
     * ========================================== */
    :root {
      --main-green: #27ae60;      
      --sat-blue: #2980b9;        
      --sun-red: #d35400;         
      --bg-light: #f4f7f8;        
      --my-row-bg: #fffbe6;       
      --name-col-width: 70px;     
    }

    html, body {
      position: fixed; 
      width: 100%; 
      /* ★修正：スマホブラウザのUI変動に強い記述に統一 */
      height: 100%; 
      overflow: hidden; overscroll-behavior: none; 
      font-family: sans-serif; margin: 0; background: var(--bg-light); color: #333; 
    }
    
    .container { 
      padding: 4px; display: flex; flex-direction: column; 
      /* ★修正：vhに加えてdvh(Dynamic Viewport Height)を使用し、スマホのアドレスバーによる高さの誤認識を防止 */
      height: 100%; height: 100dvh; 
      overflow: hidden; box-sizing: border-box; 
    }
    h3 { text-align: center; font-size: 18px; margin: 6px 0; width: 100%; }

    /* ==========================================
     * 表 (テーブル) のデザイン
     * ========================================== */
    .table-wrapper { flex: 1; overflow-y: auto; overflow-x: hidden; border-radius: 8px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 65px; position: relative; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    
    thead { position: sticky; top: 0; z-index: 10; }
    th { background: var(--main-green); color: white; padding: 4px 0; font-size: 11px; border: none; font-weight: bold; }
    .name-col-head { width: var(--name-col-width); }
    th.sat { background: var(--sat-blue); } 
    th.sun { background: var(--sun-red); } 
    
    .count-box { font-size: 10px; margin-top: 3px; padding: 2px 4px; background: rgba(0,0,0,0.15); font-weight: normal; line-height: 1.3; }
    .count-row { display: flex; justify-content: space-between; }

    td { border-bottom: 1px solid #eee; height: 48px; text-align: center; }
    .name-cell { width: var(--name-col-width); padding: 0 2px; font-weight: bold; font-size: 12px; text-align: left; background: #fafafa; border-right: 2px solid var(--main-green); word-break: break-all; }
    .my-row { background-color: var(--my-row-bg) !important; }
    
    .status-cell { font-size: 24px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .status-〇 { color: var(--main-green); font-weight: bold; } 
    .status-△ { color: #f39c12; font-weight: bold; }
    .status-× { color: #7f8c8d; font-weight: bold; }
    .status-- { color: #ccc; }

    /* ==========================================
     * フッター・ボタン・各種インジケーター
     * ========================================== */
    .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px; background: white; border-top: 1px solid #ddd; display: none; box-sizing: border-box; z-index: 100; }
    .btn-save { width: 100%; background: var(--main-green); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }

    #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top: 4px solid var(--main-green); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .view-mode .table-wrapper { margin-bottom: 0; }
    .view-mode td { height: 34px; }
    .no-schedule-msg { padding: 40px 20px; text-align: center; font-weight: bold; color: #666; }

    .scroll-indicator {
      position: fixed; bottom: 75px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7); color: white; padding: 6px 16px; border-radius: 20px;
      font-size: 12px; font-weight: bold; display: none; z-index: 1000; pointer-events: none;
      animation: bounce 1.5s infinite;
    }
    @keyframes bounce { 0%, 100% { bottom: 75px; } 50% { bottom: 65px; } }
    .view-mode .scroll-indicator { bottom: 20px; }

    /* ★追加：スマホ検証用のデバッグパネル */
    #debug-panel {
      position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8);
      color: #0f0; padding: 5px; font-size: 11px; z-index: 10000;
      pointer-events: none; border-radius: 4px; display: none; /* デフォルトは非表示 */
    }
  </style>
</head>

<body id="bodyTag">
  <div id="debug-panel"></div>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loadingText">読込中...</p>
  </div>

  <div id="registration-view" style="display:none; padding:20px; text-align:center;">
    <h3 id="regTitle">初回登録</h3>
    <p>あなたのお名前を選択してください。</p>
    <select id="name-list" style="width:100%; padding:12px; margin:15px 0; font-size:16px;"></select>
    <button class="btn-save" onclick="link()">登録する</button>
  </div>

  <div class="container" id="main-view" style="display:none;">
    <h3 id="weekTitle"></h3>
    <div class="table-wrapper" id="content-area">
      <table id="mainTable"></table>
    </div>
    <div id="scrollIndicator" class="scroll-indicator">▼ 下に続きがあります</div>
    <div id="footer" class="footer-bar">
      <button class="btn-save" onclick="saveAll()">変更を保存して閉じる</button>
    </div>
  </div>

  <script>
    const SETTINGS = {
      GAS_URL: "https://script.google.com/macros/s/AKfycbyK70SuUPhT2tt5htRxPlCHAySTSzT7TfPFmRg8S4vuS6HP7eM03Uw_r3u8D_nQdjSb/exec", 
      LIFF_ID: "2009266487-GEiMe9Ei"
    };

    let MY_LINE_ID = "";         
    let IS_VIEW_MODE = false;     
    let days = [];                
    let rawData = [];             
    let changedDayIndices = new Set(); 
    let isSaving = false;         

    const UI_CONFIG = {
      signs: ["〇", "△", "×", "-"],
      labels: { "〇": "参加", "△": "遅参", "×": "欠席", "-": "未回答" }
    };

    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) return; 
      if (!e.target.closest('.table-wrapper')) { e.preventDefault(); }
    }, { passive: false });

    async function fetchWithTimeout(url, options = {}, timeout = 15000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(id);
        return response;
      } catch (e) {
        clearTimeout(id);
        if (e.name === 'AbortError') {
          throw new Error("通信タイムアウト");
        }
        throw e;
      }
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      IS_VIEW_MODE = (params.get('mode') === 'view'); 
      if (IS_VIEW_MODE) document.getElementById("bodyTag").classList.add("view-mode");

      try {
        if (!IS_VIEW_MODE) {
          await liff.init({ liffId: SETTINGS.LIFF_ID });
          if (!liff.isLoggedIn()) { liff.login(); return; }
          const profile = await liff.getProfile();
          MY_LINE_ID = profile.userId;
        }
        await fetchData();
      } catch (e) {
        document.getElementById("loading").style.display = "none";
        console.error(e);
        alert("初期化または通信エラーが発生しました。\n\n詳細: " + e.message);
      }
    }

    async function fetchData(retryCount = 0) {
      const appUrl = encodeURIComponent(window.location.href.split('?')[0]);
      const url = `${SETTINGS.GAS_URL}?uid=${MY_LINE_ID}&action=get&mode=${IS_VIEW_MODE ? 'view' : ''}&appUrl=${appUrl}&v=${Date.now()}`;
      
      try {
        const res = await fetchWithTimeout(url);
        if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
        const data = await res.json();
        
        if (data.status === "error") throw new Error("GAS側エラー: " + data.message);

        if (data.data && data.data.title) {
          document.title = data.data.title;
        }

        if (data.status === "success") {
          if (data.data.noSchedule) {
            document.getElementById("loading").style.display = "none";
            document.getElementById("main-view").style.display = "flex";
            document.getElementById("weekTitle").innerText = "(未設定)";
            document.getElementById("content-area").innerHTML = '<div class="no-schedule-msg">現在、有効なスケジュールはありません。</div>';
            return;
          }

          days = data.data.dates;
          rawData = data.data.families;
          document.getElementById("main-view").style.display = "flex";
          document.getElementById("weekTitle").innerText = data.data.weekLabel + (IS_VIEW_MODE ? " (閲覧用)" : "");
          if (!IS_VIEW_MODE) document.getElementById("footer").style.display = "block";
          document.getElementById("loading").style.display = "none";
          
          render();
        } else if (data.status === "unregistered") {
          document.getElementById("loading").style.display = "none";
          document.getElementById("registration-view").style.display = "block";
          document.getElementById("regTitle").innerText = data.data.title || "父兄出欠確認アプリ";
          
          const select = document.getElementById("name-list");
          data.list.forEach(item => {
            let opt = document.createElement("option"); 
            opt.value = item.id; 
            opt.text = item.name; 
            select.appendChild(opt);
          });
        }
      } catch (e) {
        if (retryCount < 2) {
          await new Promise(resolve => setTimeout(resolve, 500));
          return await fetchData(retryCount + 1);
        }
        document.getElementById("loading").style.display = "none";
        console.error(e);
        alert("通信エラー、またはタイムアウト(15秒)が発生しました。\n電波の良い所で再読み込みしてください。");
      }
    }
  
    function render() {
      if (!days || days.length === 0) return;
      
      const totals = days.map(() => {
        let obj = {}; 
        UI_CONFIG.signs.forEach(s => obj[s] = 0); 
        return obj;
      });

      rawData.forEach(f => {
        f.statuses.forEach((s, i) => { 
          if (totals[i].hasOwnProperty(s)) totals[i][s]++; 
        });
      });

      let html = `<thead><tr><th class="name-col-head">団員父兄</th>`;
      days.forEach((d, i) => {
        let cls = (d.includes("日") || d.includes("祝")) ? "sun" : d.includes("土") ? "sat" : "";
        html += `<th class="${cls}">${d}<div class="count-box">`;
        UI_CONFIG.signs.forEach(s => {
          html += `<div class="count-row"><span>${s}${UI_CONFIG.labels[s]}</span><span>${totals[i][s]}</span></div>`;
        });
        html += `</div></th>`;
      });
      html += "</tr></thead><tbody>";

      rawData.forEach((f, fIdx) => {
        const isMe = (MY_LINE_ID && f.lineIds && f.lineIds.includes(MY_LINE_ID));
        html += `<tr class="${isMe ? 'my-row' : ''}"><td class="name-cell">${f.name}</td>`;
        f.statuses.forEach((s, dIdx) => {
          const canEdit = !IS_VIEW_MODE && isMe;
          const clickAttr = canEdit ? `onclick="toggle(${fIdx},${dIdx})"` : "";
          html += `<td class="status-cell status-${s}" ${clickAttr}>${s}</td>`;
        });
        html += "</tr>";
      });
      
      document.getElementById("mainTable").innerHTML = html + "</tbody>";

      // ★修正：描画完了から高さの計算までに少し余裕(300ms)を持たせ、スマホでの計算漏れを防ぐ
      setTimeout(checkScroll, 300);
    }

    function toggle(fIdx, dIdx) {
      const signs = UI_CONFIG.signs;
      const current = rawData[fIdx].statuses[dIdx];
      rawData[fIdx].statuses[dIdx] = signs[(signs.indexOf(current) + 1) % signs.length];
      changedDayIndices.add(dIdx); 
      render();
    }

    async function saveAll() {
      if (changedDayIndices.size === 0) { liff.closeWindow(); return; }
      if (isSaving) return; 

      isSaving = true;
      const loader = document.getElementById("loading");
      document.getElementById("loadingText").innerText = "保存中..."; 
      loader.style.display = "flex";

      const myData = rawData.find(f => f.lineIds && f.lineIds.includes(MY_LINE_ID));
      const payload = Array.from(changedDayIndices).map(dayIdx => ({
        familyId: myData.id,
        dateLabel: days[dayIdx],
        status: myData.statuses[dayIdx]
      }));

      try {
        const res = await fetchWithTimeout(`${SETTINGS.GAS_URL}?action=update_all&payload=${encodeURIComponent(JSON.stringify(payload))}`);
        if (!res.ok) throw new Error("HTTP Error"); 
        setTimeout(() => { liff.closeWindow(); }, 500);
      } catch (e) { 
        alert("保存エラーが発生しました。通信環境を確認して再度お試しください。"); 
        loader.style.display = "none"; 
        isSaving = false;
      }
    }

    async function link() {
      const sid = document.getElementById("name-list").value;
      document.getElementById("loading").style.display = "flex";
      try {
        await fetchWithTimeout(`${SETTINGS.GAS_URL}?uid=${MY_LINE_ID}&action=link&family_id=${sid}`);
        window.location.reload(); 
      } catch (e) { 
        alert("登録エラーが発生しました。"); 
        document.getElementById("loading").style.display = "none";
      }
    }

    /**
     * ★修正：スクロール判定ロジックの強化とデバッグ表示
     */
    function checkScroll() {
      const area = document.getElementById("content-area");
      const indicator = document.getElementById("scrollIndicator");
      const debugPanel = document.getElementById("debug-panel");
      
      if (!area || !indicator) return;

      // 小数点以下の丸め誤差を防ぐため四捨五入して整数で比較
      const scrollH = Math.round(area.scrollHeight);
      const clientH = Math.round(area.clientHeight);
      const scrollT = Math.round(area.scrollTop);

      // はみ出し判定（3pxの余裕を持たせる）
      const canScroll = scrollH > (clientH + 3);
      
      // 一番下までスクロールしたかの判定（10pxのバッファを持たせ、少し前でも消えるようにする）
      const isBottom = (scrollH - scrollT) <= (clientH + 10);

      if (canScroll && !isBottom) {
        indicator.style.display = "block";
      } else {
        indicator.style.display = "none";
      }

      // 【検証用】実機で数値を確認する場合は以下の「false」を「true」にしてください
      const showDebug = false; 
      if (showDebug) {
        debugPanel.style.display = "block";
        debugPanel.innerHTML = `全体高さ(sH): ${scrollH}<br>表示枠(cH): ${clientH}<br>スクロール量(sT): ${scrollT}<br>はみ出し有無: ${canScroll}`;
      }
    }

    document.getElementById("content-area").addEventListener("scroll", checkScroll);
    window.addEventListener("resize", checkScroll);

    window.onload = init;
  </script>
</body>
</html>
